# Grants argocd-image-updater-controller permission to read the
# kroger-mcp-harbor-pull imagePullSecret in this namespace, so it can authenticate
# to Harbor when scanning for new image tags.
#
# Without this, the controller logs:
#   Could not fetch credentials: ... secrets "kroger-mcp-harbor-pull"
#   is forbidden: User "system:serviceaccount:argocd:argocd-image-updater-controller"
#   cannot get resource "secrets" in API group "" in the namespace "kroger-mcp"
#
# Mirrors the ollama / open-terminal / freecad-mcp pattern. Lives in
# this CD repo per the RBAC-ownership rule (memory rbac-ownership): a
# controller's permissions into namespace X belong in X's repo, not in
# the controller's install.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-image-updater-secret-reader
  namespace: kroger-mcp
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  resourceNames:
  - kroger-mcp-harbor-pull
  verbs:
  - get
  - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-image-updater-secret-reader
  namespace: kroger-mcp
subjects:
- kind: ServiceAccount
  name: argocd-image-updater-controller
  namespace: argocd
roleRef:
  kind: Role
  name: argocd-image-updater-secret-reader
  apiGroup: rbac.authorization.k8s.io
