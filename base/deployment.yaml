apiVersion: apps/v1
kind: Deployment
metadata:
  name: kroger-mcp
  namespace: kroger-mcp
  labels:
    app: kroger-mcp
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: kroger-mcp
  template:
    metadata:
      labels:
        app: kroger-mcp
    spec:
      imagePullSecrets:
      - name: kroger-mcp-harbor-pull
      containers:
      - name: kroger-mcp
        image: harbor.sirddail.net/ai/kroger-mcp:0.0.6
        imagePullPolicy: IfNotPresent
        ports:
        - name: mcp
          containerPort: 8765
          protocol: TCP
        env:
        - name: MCP_PORT
          value: '8765'
        - name: KROGER_CART_DIR
          value: /data
        - name: LOG_LEVEL
          value: INFO
        envFrom:
        - secretRef:
            name: kroger-mcp-secrets
        volumeMounts:
        - name: shadow-state
          mountPath: /data
        readinessProbe:
          tcpSocket:
            port: 8765
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
        livenessProbe:
          tcpSocket:
            port: 8765
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: false
          capabilities:
            drop:
            - ALL
      volumes:
      - name: shadow-state
        persistentVolumeClaim:
          claimName: kroger-mcp-shadow-state
